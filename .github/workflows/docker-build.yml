# Validates Dockerfile on pull requests (no registry push).
# Pushes to main/master publish via docker-publish.yml.

name: Docker build

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: portfolio-site:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
