# Local Jenkins with Docker CLI (build portfolio image from pipeline).
# Usage:
#   cd jenkins
#   docker compose up -d --build
#   Open http://localhost:8081 — initial admin password:
#     docker compose exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
# Install suggested plugins, create admin user, then create a Pipeline job from SCM.

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-jenkins:local
    container_name: portfolio-jenkins
    ports:
      - "8081:8080"
      # Agent port 50000 omitted — often conflicts on WSL; not needed for local Pipeline jobs
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    user: root
    restart: unless-stopped

volumes:
  jenkins_home:
