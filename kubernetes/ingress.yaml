# Optional: requires an Ingress controller (nginx, Traefik, etc.).
# Adjust host and ingressClassName for your cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-web
  labels:
    app: portfolio-web
spec:
  ingressClassName: nginx
  rules:
    - host: portfolio.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio-web
                port:
                  number: 80
